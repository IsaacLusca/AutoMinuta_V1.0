{% extends "editor/base.html" %}

{% block title %}Novo campo | Editor de Minutas{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h3 class="mb-0">Novo campo</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" type="submit">Salvar</button>
                        <a class="btn btn-outline-secondary" href="{% url 'editor_placeholder_list' %}">Voltar</a>
                    </div>
                </form>
            </div>
        </div>
        <div class="small text-muted mt-3">
            Use <code>snake-case</code> no <strong>key</strong>. Exemplo: <code>data_publicacao_edital</code>.
        </div>
    </div>
</div>
{% endblock %}
