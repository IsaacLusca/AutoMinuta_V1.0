<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Editor de Minutas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'editor_template_list' %}">Editor de Minutas</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'pagina_minutas' %}">Gerar (antigo)</a>
                <a class="nav-link" href="{% url 'editor_placeholder_list' %}">Campos</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
